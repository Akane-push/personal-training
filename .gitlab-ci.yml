stages:
  - build
  - deploy-test
  - deploy-prod

deploy_to_test:
  stage: deploy-test
  tags:
    - runner-test
  environment:
      name: serveur-test
  script:
    - touch .env
    - mkdir -p ./airflow/logs
    - chmod -R 777 ./airflow/
    - docker compose down --remove-orphans
    - docker compose up -d --build
  only:
    - test_server

deploy_to_prod:
  stage: deploy-prod
  tags:
    - runner-prod
  environment:
      name: serveur-prod
  script:
    - touch .env
    - mkdir -p ./airflow/logs
    - chmod -R 777 ./airflow/
    - docker compose down --remove-orphans
    - docker compose up -d --build
  when: manual
  only:
    - main